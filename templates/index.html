<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 圖片生成器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Segoe UI", Helvetica, sans-serif; background: #121214; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
.card { background: #1a1a2e; max-width: 600px; width: 100%; padding: 24px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
h1 { font-size: 22px; text-align: center; margin-bottom: 4px; }
.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
input, button { width: 100%; padding: 12px; font-size: 15px; border-radius: 8px; border: 1px solid #333; outline: none; }
input { background: #222; color: #eee; margin-bottom: 12px; }
input:focus { border-color: #00f5d4; }
button { background: #00f5d4; color: #000; font-weight: 600; cursor: pointer; border: none; font-size: 16px; }
button:hover { background: #00bbf9; color: #fff; }
button:disabled { opacity: 0.5; cursor: default; }
#loading { display: none; text-align: center; padding: 30px; color: #888; font-size: 14px; }
#loading.show { display: block; }
#result { display: none; margin-top: 16px; }
#result.show { display: block; }
#result img { max-width: 100%; width: 100%; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,245,212,0.15); display: block; background: #111; }
.preview-box { background: #222; padding: 12px; border-radius: 8px; font-size: 13px; color: #00f5d4; word-break: break-all; margin-top: 10px; }
.error { color: #ff6b6b; text-align: center; padding: 20px; font-size: 14px; display: none; }
.hint { text-align: center; color: #555; font-size: 12px; margin-top: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>🎨 AI 圖片生成器</h1>
  <p class="sub">中文輸入 → Gemini 翻譯 → Pollinations 繪圖</p>

  <input type="text" id="prompt" placeholder="輸入中文，例如：一隻穿著西裝的貓在開會">
  <button id="genBtn" onclick="generate()">✨ 生成圖片</button>

  <div id="loading">
    <div style="margin-bottom:8px">⏳ Gemini 正在優化提示詞...</div>
  </div>

  <div id="result">
    <div class="preview-box" id="promptDisplay"></div>
    <div style="margin-top:12px"><img id="aiImage" src="" alt=""></div>
  </div>

  <div id="error" class="error"></div>
  <div class="hint">圖片由 Pollinations.ai 提供 | Gemini 翻譯提示詞</div>
</div>

<script>
async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { showError('請輸入內容'); return; }

  document.getElementById('genBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('error').style.display = 'none';

  try {
    const res = await fetch('/optimize-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    if (!res.ok) {
      let msg = '伺服器錯誤';
      try { const e = await res.json(); msg = e.error || e.detail; } catch(e2) { msg = await res.text(); }
      throw new Error(msg);
    }

    const data = await res.json();
    const engPrompt = data.optimized_prompt;
    document.getElementById('promptDisplay').textContent = '✨ ' + engPrompt;

    document.getElementById('loading').innerHTML = '<div>🚀 提示詞優化完成，載入圖片中...</div>';

    const img = document.getElementById('aiImage');
    const seed = Math.floor(Math.random() * 99999);
    img.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(engPrompt)}?width=1024&height=1024&seed=${seed}&nofeed=true`;

    img.onload = () => {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('result').classList.add('show');
      document.getElementById('genBtn').disabled = false;
    };
    img.onerror = () => {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('result').classList.add('show');
      img.alt = '圖片載入失敗（Pollinations 速率限制，請稍後再試）';
      img.style.display = 'none';
      document.getElementById('error').textContent = '⚠️ Pollinations 免費服務忙碌中，請稍後再試';
      document.getElementById('error').style.display = 'block';
      document.getElementById('genBtn').disabled = false;
    };
  } catch (e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('genBtn').disabled = false;
    showError(e.message);
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
