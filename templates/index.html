<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 圖片生成器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Segoe UI", Helvetica, sans-serif; background: #121214; color: #e0e0e0; min-height: 100vh; padding: 12px; }
.card { background: #1a1a2e; max-width: 620px; width: 100%; margin: 0 auto 16px; padding: 20px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
h1 { font-size: 20px; text-align: center; }
.sub { text-align: center; color: #888; font-size: 12px; margin-bottom: 16px; }

.tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { flex: 1; text-align: center; padding: 8px 4px; font-size: 12px; background: #222; color: #888; border-radius: 8px; cursor: pointer; min-width: 0; white-space: nowrap; }
.tab.active { background: #00f5d4; color: #000; font-weight: 600; }
.tab-body { display: none; }
.tab-body.active { display: block; }

input, textarea, button { width: 100%; padding: 12px; font-size: 15px; border-radius: 8px; border: 1px solid #333; outline: none; }
input, textarea { background: #222; color: #eee; margin-bottom: 10px; }
textarea { resize: vertical; min-height: 60px; font-family: inherit; }
input:focus, textarea:focus { border-color: #00f5d4; }
button { background: #00f5d4; color: #000; font-weight: 600; cursor: pointer; border: none; font-size: 16px; }
button:hover { background: #00bbf9; color: #fff; }
button:disabled { opacity: 0.5; cursor: default; }
.btn-sm { background: #333; color: #eee; font-size: 13px; padding: 8px 14px; width: auto; border-radius: 6px; cursor: pointer; border: 1px solid #555; }
.btn-sm:hover { background: #444; }

.row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.row select, .row input:not([type=text]) { flex: 1; min-width: 0; padding: 10px; font-size: 14px; border-radius: 8px; border: 1px solid #333; background: #222; color: #eee; outline: none; }
.row label { display: flex; align-items: center; color: #aaa; font-size: 13px; white-space: nowrap; }

.advanced { margin-top: 6px; }
.advanced-toggle { color: #666; font-size: 13px; cursor: pointer; user-select: none; padding: 4px 0; display: inline-block; }
.advanced-toggle:hover { color: #00f5d4; }
.advanced-body { display: none; margin-top: 6px; }
.advanced-body.open { display: block; }

#loading { display: none; text-align: center; padding: 20px; color: #888; font-size: 14px; }
#loading.show { display: block; }
#result { display: none; margin-top: 12px; }
#result.show { display: block; }
#result img { max-width: 100%; width: 100%; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,245,212,0.15); display: block; background: #111; }
.img-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.preview-box { background: #222; padding: 10px; border-radius: 8px; font-size: 13px; color: #00f5d4; word-break: break-all; margin-top: 8px; }
.error { color: #ff6b6b; text-align: center; padding: 12px; font-size: 14px; display: none; }
.hint { text-align: center; color: #555; font-size: 12px; margin-top: 10px; }

.section-title { font-size: 16px; margin: 16px 0 10px; color: #ccc; }
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.gallery-item { background: #1a1a2e; border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; }
.gallery-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #111; }
.gallery-item .gallery-label { padding: 4px 6px; font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #1a1a2e; }

/* Chat */
.chat-box { background: #111; border-radius: 10px; padding: 12px; height: 300px; overflow-y: auto; margin-bottom: 8px; display: flex; flex-direction: column; gap: 8px; }
.chat-msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
.chat-msg.user { background: #00f5d4; color: #000; align-self: flex-end; }
.chat-msg.bot { background: #2a2a4a; color: #e0e0e0; align-self: flex-start; }
.chat-msg.error { background: #3a1a1a; color: #ff6b6b; align-self: flex-start; text-align: left; }
.chat-msg.loading { background: transparent; color: #888; align-self: flex-start; font-style: italic; }
.chat-row { display: flex; gap: 8px; }
.chat-row input { flex: 1; margin-bottom: 0; }
.chat-row button { width: auto; padding: 12px 20px; white-space: nowrap; }

/* TTS */
.tts-row { display: flex; gap: 8px; align-items: flex-end; }
.tts-row textarea { flex: 1; margin-bottom: 0; }
.tts-row button { width: auto; padding: 12px 20px; white-space: nowrap; }

/* Image upload */
.upload-area { border: 2px dashed #444; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 10px; color: #888; font-size: 14px; background: #1e1e30; }
.upload-area.dragover { border-color: #00f5d4; background: #1a2a3e; }
.upload-area img { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 8px; }

/* Batch */
.batch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 10px; }
.batch-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; background: #111; }
</style>
</head>
<body>

<div class="card">
  <h1>🎨 AI 多媒體工具</h1>
  <p class="sub">中文輸入 → AI 翻譯 → Hugging Face / Groq</p>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="gen">🖼️ 生圖</div>
    <div class="tab" data-tab="chat">💬 聊天</div>
    <div class="tab" data-tab="img2img">🖼️→🖼️ 改圖</div>
    <div class="tab" data-tab="batch">🔄 批次</div>
    <div class="tab" data-tab="tts">🔊 語音</div>
  </div>

  <!-- ===== Tab 1: Generate Image ===== -->
  <div class="tab-body active" id="tab-gen">
    <input type="text" id="prompt" placeholder="輸入中文，例如：一隻穿著西裝的貓在開會">
    <div class="row">
      <label>📐</label>
      <select id="mode">
        <option value="single">單張圖片</option>
        <option value="storyboard4">四格分鏡</option>
      </select>
      <label>🎨</label>
      <select id="style">
        <option value="realistic">寫實</option>
        <option value="anime">動漫</option>
        <option value="watercolor">水彩</option>
        <option value="oilpainting">油畫</option>
        <option value="sketch">素描</option>
        <option value="pixel">像素風</option>
      </select>
      <label>📏</label>
      <select id="size">
        <option value="512x512">512×512</option>
        <option value="1024x1024" selected>1024×1024</option>
      </select>
    </div>
    <div class="advanced">
      <span class="advanced-toggle" onclick="toggleAdvanced()">⚙️ 進階選項 ▸</span>
      <div class="advanced-body" id="advancedBody">
        <input type="text" id="negativePrompt" placeholder="不想出現的東西（選填）">
        <input type="text" id="shareCode" placeholder="共享密碼（選填）">
      </div>
    </div>
    <button id="genBtn" onclick="generate()">✨ 生成圖片</button>
    <div id="loading"><div>⏳ 處理中...</div></div>
    <div id="result">
      <div class="preview-box" id="promptDisplay"></div>
      <div style="margin-top:10px"><img id="aiImage" src="" alt=""></div>
      <div class="img-actions">
        <button class="btn-sm" id="downloadBtn" onclick="downloadImage()">⬇️ 下載</button>
      </div>
    </div>
    <div id="error" class="error"></div>
  </div>

  <!-- ===== Tab 2: Chat ===== -->
  <div class="tab-body" id="tab-chat">
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-row">
      <input type="text" id="chatInput" placeholder="輸入訊息..." onkeydown="if(event.key==='Enter') sendChatMessage()">
      <button onclick="sendChatMessage()">送出</button>
    </div>
  </div>

  <!-- ===== Tab 3: Image-to-Image ===== -->
  <div class="tab-body" id="tab-img2img">
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('imgInput').click()">
      <div id="uploadText">點擊或拖曳圖片到此處</div>
      <img id="uploadPreview" style="display:none">
    </div>
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleUpload(event)">
    <input type="text" id="img2imgPrompt" placeholder="描述要如何修改這張圖...">
    <button onclick="sendImg2Img()">🎨 生成</button>
    <div id="img2imgResult" style="display:none;margin-top:10px">
      <img id="img2imgImage" src="" style="width:100%;border-radius:12px">
      <div class="img-actions">
        <button class="btn-sm" onclick="downloadImg2Img()">⬇️ 下載</button>
      </div>
    </div>
  </div>

  <!-- ===== Tab 4: Batch ===== -->
  <div class="tab-body" id="tab-batch">
    <input type="text" id="batchPrompt" placeholder="輸入中文提示詞...">
    <div class="row">
      <label>數量</label>
      <select id="batchCount">
        <option value="2">2 張</option>
        <option value="4" selected>4 張</option>
        <option value="6">6 張</option>
        <option value="8">8 張</option>
      </select>
      <label>尺寸</label>
      <select id="batchSize">
        <option value="512x512" selected>512×512</option>
        <option value="1024x1024">1024×1024</option>
      </select>
    </div>
    <button onclick="batchGenerate()">🔄 批次生成</button>
    <div id="batchLoading" style="display:none;text-align:center;padding:16px;color:#888">⏳ 生成中...</div>
    <div class="batch-grid" id="batchGrid"></div>
  </div>

  <!-- ===== Tab 5: TTS ===== -->
  <div class="tab-body" id="tab-tts">
    <textarea id="ttsText" placeholder="輸入要轉成語音的文字...">你好，歡迎使用 AI 多媒體工具。這是一個測試語音。</textarea>
    <div class="row">
      <label>🎤 語音</label>
      <select id="ttsVoice"><option value="">系統預設</option></select>
      <label>⚡ 速度</label>
      <select id="ttsRate">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
      </select>
    </div>
    <div class="tts-row">
      <button onclick="speakTTS()">🔊 朗讀</button>
      <button class="btn-sm" onclick="stopTTS()">⏹️ 停止</button>
    </div>
    <div id="ttsStatus" style="text-align:center;padding:8px;color:#888;font-size:13px">✅ 就緒</div>
  </div>
</div>

<div class="card">
  <div class="section-title">🖼️ 歷史畫廊</div>
  <div class="gallery" id="gallery"></div>
  <p id="galleryEmpty" style="text-align:center;color:#555;font-size:13px;padding:16px">尚無圖片</p>
</div>

<script>
// === Tab switching ===
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-body').forEach(b => b.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// === Generate Image ===
let currentImageUrl = '';
let currentZhPrompt = '';

function toggleAdvanced() {
  const body = document.getElementById('advancedBody');
  const toggle = document.querySelector('.advanced-toggle');
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? '⚙️ 進階選項 ▾' : '⚙️ 進階選項 ▸';
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { showError('請輸入內容'); return; }
  const mode = document.getElementById('mode').value;
  const style = document.getElementById('style').value;
  const size = document.getElementById('size').value;
  const negative = document.getElementById('negativePrompt').value.trim();
  const code = document.getElementById('shareCode').value.trim();
  document.getElementById('genBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('error').style.display = 'none';
  currentImageUrl = '';
  currentZhPrompt = prompt;
  try {
    const res = await fetch('/optimize-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, mode, style, code })
    });
    if (!res.ok) {
      let msg = '伺服器錯誤';
      try { const e = await res.json(); msg = e.error || e.detail; } catch(e2) { msg = await res.text(); }
      throw new Error(msg);
    }
    const data = await res.json();
    const engPrompt = data.optimized_prompt;
    document.getElementById('promptDisplay').textContent = '✨ ' + engPrompt;
    document.getElementById('loading').innerHTML = '<div>🚀 產生圖片中...</div>';
    const img = document.getElementById('aiImage');
    const seed = Math.floor(Math.random() * 99999);
    img.onload = () => {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('result').classList.add('show');
      document.getElementById('genBtn').disabled = false;
    };
    img.onerror = () => {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('result').classList.add('show');
      document.getElementById('genBtn').disabled = false;
      document.getElementById('error').textContent = '⚠️ 圖片產生失敗';
      document.getElementById('error').style.display = 'block';
    };
    img.src = `/generate-image?prompt=${encodeURIComponent(engPrompt)}&seed=${seed}&size=${size}&negative=${encodeURIComponent(negative)}&zh=${encodeURIComponent(prompt)}&mode=${mode}&style=${style}`;
  } catch (e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('genBtn').disabled = false;
    showError(e.message);
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

function downloadImage() {
  const img = document.getElementById('aiImage');
  if (!img.src) return;
  const link = document.createElement('a');
  link.download = 'ai-image.png';
  link.href = img.src;
  link.click();
}

// === Chat ===
const chatBox = document.getElementById('chatBox');
const chatInput = document.getElementById('chatInput');
let chatHistory = [];

function addChatMsg(text, role) {
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendChatMessage() {
  const msg = chatInput.value.trim();
  if (!msg) return;
  chatInput.value = '';
  addChatMsg(msg, 'user');
  chatHistory.push({ role: 'user', content: msg });
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'chat-msg loading';
  loadingDiv.textContent = '⏳';
  chatBox.appendChild(loadingDiv);
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: chatHistory.slice(-10) })
    });
    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.error || '連線失敗');
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let reply = '';
    loadingDiv.remove();
    const replyDiv = document.createElement('div');
    replyDiv.className = 'chat-msg bot';
    chatBox.appendChild(replyDiv);
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      reply += decoder.decode(value, { stream: true });
      replyDiv.textContent = reply;
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    loadingDiv.remove();
    addChatMsg(e.message, 'error');
  }
}

// === Image-to-Image ===
let uploadedImageB64 = '';

function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const b64 = ev.target.result.split(',')[1];
    uploadedImageB64 = b64;
    document.getElementById('uploadText').textContent = file.name;
    const preview = document.getElementById('uploadPreview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const b64 = ev.target.result.split(',')[1];
      uploadedImageB64 = b64;
      document.getElementById('uploadText').textContent = file.name;
      const preview = document.getElementById('uploadPreview');
      preview.src = ev.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

async function sendImg2Img() {
  const prompt = document.getElementById('img2imgPrompt').value.trim();
  if (!prompt || !uploadedImageB64) { alert('請上傳圖片並輸入修改描述'); return; }
  const btn = document.querySelector('#tab-img2img button');
  btn.disabled = true;
  btn.textContent = '⏳ 處理中...';
  document.getElementById('img2imgResult').style.display = 'none';
  try {
    const res = await fetch('/img2img', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, image: uploadedImageB64 })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || '失敗'); }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    document.getElementById('img2imgImage').src = url;
    document.getElementById('img2imgResult').style.display = 'block';
  } catch (e) {
    alert('錯誤: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🎨 生成';
  }
}

function downloadImg2Img() {
  const img = document.getElementById('img2imgImage');
  if (!img.src) return;
  const link = document.createElement('a');
  link.download = 'img2img-result.png';
  link.href = img.src;
  link.click();
}

// === Batch ===
async function batchGenerate() {
  const prompt = document.getElementById('batchPrompt').value.trim();
  if (!prompt) { alert('請輸入提示詞'); return; }
  const count = parseInt(document.getElementById('batchCount').value);
  const size = document.getElementById('batchSize').value;
  document.getElementById('batchLoading').style.display = 'block';
  const grid = document.getElementById('batchGrid');
  grid.innerHTML = '';
  try {
    const res = await fetch('/optimize-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, mode: 'single', style: 'realistic', code: '' })
    });
    if (!res.ok) throw new Error('優化失敗');
    const data = await res.json();
    const engPrompt = data.optimized_prompt;
    const batchRes = await fetch(`/batch-generate?prompt=${encodeURIComponent(engPrompt)}&count=${count}&size=${size}`);
    if (!batchRes.ok) throw new Error('批次生成失敗');
    const batchData = await batchRes.json();
    if (!batchData.images || !batchData.images.length) throw new Error('沒有生成結果');
    batchData.images.forEach((item, i) => {
      const img = document.createElement('img');
      img.src = 'data:image/jpeg;base64,' + item.image;
      img.alt = `Image ${item.seed}`;
      img.title = `Seed: ${item.seed}`;
      const link = document.createElement('a');
      link.href = img.src;
      link.download = `batch-${i+1}.png`;
      link.appendChild(img);
      grid.appendChild(link);
    });
  } catch (e) {
    grid.innerHTML = '<div style="color:#ff6b6b;text-align:center;padding:20px">❌ ' + e.message + '</div>';
  } finally {
    document.getElementById('batchLoading').style.display = 'none';
  }
}

// === TTS (Browser Speech Synthesis API) ===
function populateVoices() {
  const sel = document.getElementById('ttsVoice');
  const voices = speechSynthesis.getVoices();
  const zhVoices = voices.filter(v => v.lang.startsWith('zh'));
  sel.innerHTML = '<option value="">系統預設</option>';
  zhVoices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = v.name;
    sel.appendChild(opt);
  });
}
speechSynthesis.onvoiceschanged = populateVoices;
if (speechSynthesis.getVoices().length) populateVoices();

function speakTTS() {
  const text = document.getElementById('ttsText').value.trim();
  if (!text) return;
  window.speechSynthesis.cancel();
  const voices = speechSynthesis.getVoices();
  const selected = document.getElementById('ttsVoice').value;
  const rate = parseFloat(document.getElementById('ttsRate').value);
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-TW';
  utter.rate = rate;
  if (selected) {
    const voice = voices.find(v => v.name === selected);
    if (voice) utter.voice = voice;
  }
  utter.onstart = () => { document.getElementById('ttsStatus').textContent = '🔊 朗讀中...'; };
  utter.onend = () => { document.getElementById('ttsStatus').textContent = '✅ 朗讀完成'; };
  utter.onerror = (e) => { document.getElementById('ttsStatus').textContent = '❌ 錯誤: ' + e.error; };
  window.speechSynthesis.speak(utter);
}

function stopTTS() {
  window.speechSynthesis.cancel();
  document.getElementById('ttsStatus').textContent = '⏹️ 已停止';
}

// === History ===
async function loadHistory() {
  try {
    const res = await fetch('/history');
    if (!res.ok) return;
    const items = await res.json();
    const gallery = document.getElementById('gallery');
    const empty = document.getElementById('galleryEmpty');
    if (!items.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    gallery.innerHTML = items.map(item =>
      `<div class="gallery-item" onclick="previewHistory('${item.image}')">
        <img src="data:image/jpeg;base64,${item.image}" alt="${item.en}">
        <div class="gallery-label">${item.mode === 'storyboard4' ? '📐分鏡' : '🖼單張'} ${item.style}</div>
      </div>`
    ).join('');
  } catch (e) {}
}

function previewHistory(b64) {
  document.querySelector('[data-tab="gen"]').click();
  const img = document.getElementById('aiImage');
  img.src = 'data:image/jpeg;base64,' + b64;
  document.getElementById('result').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadHistory();
setInterval(loadHistory, 5000);
</script>
</body>
</html>
