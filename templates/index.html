<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 多媒體工具</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Segoe UI", Helvetica, sans-serif; background: #121214; color: #e0e0e0; min-height: 100vh; padding: 12px; }
.card { background: #1a1a2e; max-width: 620px; width: 100%; margin: 0 auto 16px; padding: 20px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
h1 { font-size: 20px; text-align: center; }
.sub { text-align: center; color: #888; font-size: 12px; margin-bottom: 16px; }
.tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 16px; }
.tab { text-align: center; padding: 8px; font-size: 13px; background: #222; color: #888; border-radius: 8px; cursor: pointer; }
.tab.active { background: #00f5d4; color: #000; font-weight: 600; }
.tab-body { display: none; }
.tab-body.active { display: block; }
input, textarea, button { width: 100%; padding: 12px; font-size: 15px; border-radius: 8px; border: 1px solid #333; outline: none; }
input, textarea { background: #222; color: #eee; margin-bottom: 10px; }
textarea { resize: vertical; min-height: 60px; font-family: inherit; }
input:focus, textarea:focus { border-color: #00f5d4; }
button { background: #00f5d4; color: #000; font-weight: 600; cursor: pointer; border: none; font-size: 16px; }
button:hover { background: #00bbf9; color: #fff; }
button:disabled { opacity: 0.5; cursor: default; }
.btn-sm { background: #333; color: #eee; font-size: 13px; padding: 8px 14px; width: auto; border-radius: 6px; cursor: pointer; border: 1px solid #555; }
.btn-sm:hover { background: #444; }
.row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.row select, .row input:not([type=text]) { flex: 1; min-width: 0; padding: 10px; font-size: 14px; border-radius: 8px; border: 1px solid #333; background: #222; color: #eee; outline: none; }
.row label { display: flex; align-items: center; color: #aaa; font-size: 13px; white-space: nowrap; }
.advanced { margin-top: 6px; }
.advanced-toggle { color: #666; font-size: 13px; cursor: pointer; user-select: none; padding: 4px 0; display: inline-block; }
.advanced-toggle:hover { color: #00f5d4; }
.advanced-body { display: none; margin-top: 6px; }
.advanced-body.open { display: block; }
#loading { display: none; text-align: center; padding: 20px; color: #888; font-size: 14px; }
#loading.show { display: block; }
#result { display: none; margin-top: 12px; }
#result.show { display: block; }
#result img { max-width: 100%; width: 100%; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,245,212,0.15); display: block; background: #111; }
.img-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.preview-box { background: #222; padding: 10px; border-radius: 8px; font-size: 13px; color: #00f5d4; word-break: break-all; margin-top: 8px; }
.error { color: #ff6b6b; text-align: center; padding: 12px; font-size: 14px; display: none; }
.section-title { font-size: 16px; margin: 16px 0 10px; color: #ccc; }

/* Saved prompts */
.saved-list { display: none; margin-bottom: 10px; }
.saved-list.open { display: block; }
.saved-item { display: flex; gap: 6px; align-items: center; padding: 6px 8px; background: #222; border-radius: 6px; margin-bottom: 4px; font-size: 13px; cursor: pointer; }
.saved-item:hover { background: #2a2a3e; }
.saved-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.saved-item .del { color: #ff6b6b; cursor: pointer; font-size: 15px; padding: 0 4px; }

/* Palette */
.palette { display: none; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.palette.show { display: flex; }
.swatch { width: 40px; height: 40px; border-radius: 8px; cursor: pointer; border: 2px solid #333; position: relative; }
.swatch:hover { border-color: #00f5d4; }
.swatch .hex { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #888; white-space: nowrap; }

/* Chat */
.chat-box { background: #111; border-radius: 10px; padding: 12px; height: 300px; overflow-y: auto; margin-bottom: 8px; display: flex; flex-direction: column; gap: 8px; }
.chat-msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
.chat-msg.user { background: #00f5d4; color: #000; align-self: flex-end; }
.chat-msg.bot { background: #2a2a4a; color: #e0e0e0; align-self: flex-start; }
.chat-msg.error { background: #3a1a1a; color: #ff6b6b; align-self: flex-start; }
.chat-msg.loading { background: transparent; color: #888; align-self: flex-start; font-style: italic; }
.chat-row { display: flex; gap: 8px; }
.chat-row input { flex: 1; margin-bottom: 0; }
.chat-row button { width: auto; padding: 12px 20px; white-space: nowrap; }

/* TTS */
.tts-row { display: flex; gap: 8px; align-items: flex-end; }
.tts-row button { width: auto; padding: 12px 20px; white-space: nowrap; }

/* Image upload */
.upload-area { border: 2px dashed #444; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 10px; color: #888; font-size: 14px; background: #1e1e30; }
.upload-area.dragover { border-color: #00f5d4; background: #1a2a3e; }
.upload-area img { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 8px; }

/* Batch */
.batch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 10px; }
.batch-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; background: #111; }

/* Story */
.scene { background: #222; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.scene .num { color: #00f5d4; font-size: 12px; font-weight: 600; }
.scene .para { margin: 8px 0; line-height: 1.7; font-size: 14px; }
.scene img { width: 100%; border-radius: 8px; margin-top: 8px; background: #111; }
.scene .gen-pending { text-align: center; padding: 20px; color: #888; font-size: 13px; }

/* Meme */
.meme-canvas-wrap { background: #111; border-radius: 12px; overflow: hidden; margin-top: 10px; }
.meme-canvas-wrap canvas { width: 100%; display: block; }
.meme-upload { border: 2px dashed #444; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; color: #888; font-size: 14px; background: #1e1e30; margin-bottom: 10px; }
.meme-upload.dragover { border-color: #00f5d4; background: #1a2a3e; }

/* Collage */
.collage-grid { display: grid; gap: 4px; background: #111; border-radius: 12px; overflow: hidden; margin-top: 10px; }
.collage-grid img { width: 100%; display: block; }
.collage-upload-area { border: 2px dashed #444; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; color: #888; font-size: 14px; background: #1e1e30; margin-bottom: 10px; }
.collage-upload-area.dragover { border-color: #00f5d4; background: #1a2a3e; }
.collage-thumbs { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
.collage-thumbs img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 2px solid #333; cursor: pointer; }
.collage-thumbs img.selected { border-color: #00f5d4; }
#vidStatus { text-align: center; padding: 8px; color: #888; font-size: 13px; }
</style>
</head>
<body>

<div class="card">
  <h1>🎨 AI 多媒體工具</h1>
  <p class="sub">中文輸入 → AI 翻譯 → Transformers.js 瀏覽器生圖</p>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="gen">🖼️ 生圖</div>
    <div class="tab" data-tab="story">📖 故事</div>
    <div class="tab" data-tab="chat">💬 聊天</div>
    <div class="tab" data-tab="img2img">🖼️→🖼️ 改圖</div>
    <div class="tab" data-tab="batch">🔄 批次</div>
    <div class="tab" data-tab="meme">🎭 迷因</div>
    <div class="tab" data-tab="collage">🖼️ 拼貼</div>
    <div class="tab" data-tab="vid">🎬 動畫</div>
    <div class="tab" data-tab="tts">🔊 語音</div>
  </div>

  <!-- ===== Tab 1: Generate ===== -->
  <div class="tab-body active" id="tab-gen">
    <div class="row" style="margin-bottom:0">
      <input type="text" id="prompt" placeholder="輸入中文，例如：一隻穿著西裝的貓在開會" style="flex:1;margin-bottom:0">
      <button class="btn-sm" onclick="savePrompt()" title="收藏目前設定">📌</button>
      <button class="btn-sm" onclick="toggleSaved()" title="檢視收藏">📋</button>
    </div>
    <div class="saved-list" id="savedList"></div>
    <div class="row">
      <label>📐</label><select id="mode"><option value="single">單張</option><option value="storyboard4">四格</option></select>
      <label>🎨</label><select id="style"><option value="realistic">寫實</option><option value="anime">動漫</option><option value="watercolor">水彩</option><option value="oilpainting">油畫</option><option value="sketch">素描</option><option value="pixel">像素風</option></select>
      <label>📏</label><select id="size"><option value="512x512">512×512</option><option value="1024x1024" selected>1024×1024</option></select>
    </div>
    <div class="advanced">
      <span class="advanced-toggle" onclick="toggleAdvanced()">⚙️ 進階選項 ▸</span>
      <div class="advanced-body" id="advancedBody">
        <input type="text" id="negativePrompt" placeholder="不想出現的東西（選填）">
        <input type="number" id="seedInput" placeholder="Seed（留空 = 隨機）" min="0" max="99999">
        <input type="text" id="shareCode" placeholder="共享密碼（選填）">
      </div>
    </div>
    <button id="genBtn" onclick="generate()">✨ 生成圖片</button>
    <div id="loading"><div>⏳ 處理中...</div></div>
    <div id="result">
      <div class="preview-box" id="promptDisplay"></div>
      <div style="margin-top:10px"><img id="aiImage" src="" alt=""></div>
      <div class="palette" id="palette"></div>
      <div class="img-actions"><button class="btn-sm" onclick="downloadImage()">⬇️ 下載</button></div>
    </div>
    <div id="error" class="error"></div>
  </div>

  <!-- ===== Tab 2: Story ===== -->
  <div class="tab-body" id="tab-story">
    <input type="text" id="storyTheme" placeholder="輸入故事主題，例如：一隻勇敢的小貓">
    <div class="row">
      <label>🎨 風格</label>
      <select id="storyStyle"><option value="realistic">寫實</option><option value="anime" selected>動漫</option><option value="watercolor">水彩</option><option value="oilpainting">油畫</option><option value="sketch">素描</option><option value="pixel">像素風</option></select>
    </div>
    <button onclick="generateStory()">📖 生成故事</button>
    <div id="storyLoading" style="display:none;text-align:center;padding:20px;color:#888">⏳ 生成故事中...</div>
    <div id="storyResult" style="margin-top:12px"></div>
  </div>

  <!-- ===== Tab 3: Chat ===== -->
  <div class="tab-body" id="tab-chat">
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-row">
      <input type="text" id="chatInput" placeholder="輸入訊息..." onkeydown="if(event.key==='Enter') sendChatMessage()">
      <button onclick="sendChatMessage()">送出</button>
    </div>
  </div>

  <!-- ===== Tab 4: img2img ===== -->
  <div class="tab-body" id="tab-img2img">
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('imgInput').click()">
      <div id="uploadText">點擊或拖曳圖片到此處</div>
      <img id="uploadPreview" style="display:none">
    </div>
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleUpload(event)">
    <input type="text" id="img2imgPrompt" placeholder="描述要如何修改這張圖...">
    <button onclick="sendImg2Img()">🎨 生成</button>
    <div id="img2imgResult" style="display:none;margin-top:10px">
      <img id="img2imgImage" src="" style="width:100%;border-radius:12px">
      <div class="img-actions"><button class="btn-sm" onclick="downloadImg2Img()">⬇️ 下載</button></div>
    </div>
  </div>

  <!-- ===== Tab 5: Batch ===== -->
  <div class="tab-body" id="tab-batch">
    <input type="text" id="batchPrompt" placeholder="輸入中文提示詞...">
    <div class="row">
      <label>數量</label><select id="batchCount"><option value="2">2</option><option value="4" selected>4</option><option value="6">6</option><option value="8">8</option></select>
      <label>尺寸</label><select id="batchSize"><option value="512x512" selected>512×512</option><option value="1024x1024">1024×1024</option></select>
    </div>
    <button onclick="batchGenerate()">🔄 批次生成</button>
    <div id="batchLoading" style="display:none;text-align:center;padding:16px;color:#888">⏳ 生成中...</div>
    <div class="batch-grid" id="batchGrid"></div>
  </div>

  <!-- ===== Tab 6: Meme ===== -->
  <div class="tab-body" id="tab-meme">
    <div class="meme-upload" id="memeUpload" onclick="document.getElementById('memeFile').click()">
      <div id="memeUploadText">點擊或拖曳圖片（或用最近生成的圖片）</div>
      <img id="memePreview" style="display:none;max-width:100%;max-height:180px;border-radius:8px;margin-top:8px">
    </div>
    <input type="file" id="memeFile" accept="image/*" style="display:none" onchange="loadMemeImage(event)">
    <input type="text" id="memeTop" placeholder="上方文字（選填）">
    <input type="text" id="memeBottom" placeholder="下方文字（選填）">
    <div class="row">
      <button onclick="renderMeme()" style="flex:1">🎭 生成迷因</button>
      <button class="btn-sm" id="memeDlBtn" style="display:none" onclick="downloadMeme()">⬇️ 下載</button>
    </div>
    <div class="meme-canvas-wrap" id="memeCanvasWrap" style="display:none">
      <canvas id="memeCanvas"></canvas>
    </div>
  </div>

  <!-- ===== Tab 7: Collage ===== -->
  <div class="tab-body" id="tab-collage">
    <div class="collage-upload-area" id="collageUpload" onclick="document.getElementById('collageFiles').click()">
      <div id="collageUploadText">點擊選擇多張圖片（或拖曳）</div>
    </div>
    <input type="file" id="collageFiles" accept="image/*" multiple style="display:none" onchange="loadCollageImages(event)">
    <div class="collage-thumbs" id="collageThumbs"></div>
    <div class="row">
      <label>佈局</label>
      <select id="collageLayout"><option value="2x2">2×2</option><option value="3x3">3×3</option><option value="4x4">4×4</option></select>
      <button onclick="renderCollage()" style="flex:1">🖼️ 生成拼貼</button>
      <button class="btn-sm" id="collageDlBtn" style="display:none" onclick="downloadCollage()">⬇️ 下載</button>
    </div>
    <div id="collageResult" style="display:none;margin-top:8px"></div>
  </div>

  <!-- ===== Tab 8: Video Slideshow ===== -->
  <div class="tab-body" id="tab-vid">
    <div class="collage-upload-area" id="vidUpload" onclick="document.getElementById('vidFiles').click()">
      <div id="vidUploadText">選擇多張圖片，自動輪播成影片</div>
    </div>
    <input type="file" id="vidFiles" accept="image/*" multiple style="display:none" onchange="loadVidImages(event)">
    <div class="collage-thumbs" id="vidThumbs"></div>
    <div class="row">
      <label>🎬 轉場</label>
      <select id="vidTransition">
        <option value="fade">淡入淡出</option>
        <option value="slide">滑動</option>
        <option value="zoom">縮放</option>
      </select>
      <label>⏱ 秒/張</label>
      <select id="vidDuration">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </div>
    <div class="row">
      <button id="vidPlayBtn" onclick="playVid()">▶️ 播放</button>
      <button class="btn-sm" id="vidDlBtn" style="display:none" onclick="downloadVid()">⬇️ 下載影片</button>
    </div>
    <div style="background:#111;border-radius:12px;overflow:hidden;margin-top:8px">
      <canvas id="vidCanvas" style="width:100%;display:block"></canvas>
    </div>
    <div id="vidStatus" style="text-align:center;padding:8px;color:#888;font-size:13px">就緒</div>
  </div>

  <!-- ===== Tab 9: TTS ===== -->
  <div class="tab-body" id="tab-tts">
    <textarea id="ttsText" placeholder="輸入要轉成語音的文字...">你好，歡迎使用 AI 多媒體工具。</textarea>
    <div class="row">
      <label>🎤</label><select id="ttsVoice"><option value="">系統預設</option></select>
      <label>⚡</label><select id="ttsRate"><option value="0.5">0.5x</option><option value="0.75">0.75x</option><option value="1" selected>1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select>
    </div>
    <div class="tts-row">
      <button onclick="speakTTS()">🔊 朗讀</button>
      <button class="btn-sm" onclick="stopTTS()">⏹️ 停止</button>
    </div>
    <div id="ttsStatus" style="text-align:center;padding:8px;color:#888;font-size:13px">✅ 就緒</div>
  </div>
</div>

<div class="card">
  <div class="section-title">🖼️ 歷史畫廊</div>
  <div class="gallery" id="gallery"></div>
  <p id="galleryEmpty" style="text-align:center;color:#555;font-size:13px;padding:16px">尚無圖片</p>
</div>

<script>
// === Tab switching ===
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-body').forEach(b => b.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ===== Transformers.js Helper =====
let sdPipeline = null;
async function getSDPipeline() {
  if (sdPipeline) return sdPipeline;
  const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
  sdPipeline = await pipeline('text-to-image', 'Xenova/stable-diffusion-v1-5', {
    progress_callback: (p) => {
      if (p.status === 'download' && p.progress != null) {
        document.getElementById('loading').innerHTML = `<div>📥 下載模型 ${Math.round(p.progress * 100)}%</div>`;
      }
    }
  });
  return sdPipeline;
}
async function sdGenerate(prompt) {
  const gen = await getSDPipeline();
  const result = await gen(prompt, { num_inference_steps: 20 });
  const raw = result[0];
  const canvas = document.createElement('canvas');
  canvas.width = raw.width; canvas.height = raw.height;
  const ctx = canvas.getContext('2d');
  const rgba = new Uint8ClampedArray(raw.width * raw.height * 4);
  const d = raw.data;
  for (let i = 0; i < raw.width * raw.height; i++) {
    rgba[i * 4] = d[i * 3]; rgba[i * 4 + 1] = d[i * 3 + 1];
    rgba[i * 4 + 2] = d[i * 3 + 2]; rgba[i * 4 + 3] = 255;
  }
  ctx.putImageData(new ImageData(rgba, raw.width, raw.height), 0, 0);
  return new Promise(r => canvas.toBlob(r, 'image/png'));
}

// ===== 1. Generate Image =====
function toggleAdvanced() {
  const body = document.getElementById('advancedBody');
  const toggle = document.querySelector('.advanced-toggle');
  body.classList.toggle('open');
  toggle.textContent = body.classList.contains('open') ? '⚙️ 進階選項 ▾' : '⚙️ 進階選項 ▸';
}

function getSavedPrompts() { try { return JSON.parse(localStorage.getItem('savedPrompts') || '[]'); } catch { return []; } }
function setSavedPrompts(list) { localStorage.setItem('savedPrompts', JSON.stringify(list)); renderSaved(); }
function savePrompt() {
  const name = prompt('為這個設定取個名稱：');
  if (!name) return;
  const list = getSavedPrompts();
  list.push({ name, prompt: document.getElementById('prompt').value, mode: document.getElementById('mode').value, style: document.getElementById('style').value, size: document.getElementById('size').value, negative: document.getElementById('negativePrompt').value, seed: document.getElementById('seedInput').value });
  setSavedPrompts(list);
}
function loadPrompt(item) {
  document.getElementById('prompt').value = item.prompt || '';
  document.getElementById('mode').value = item.mode || 'single';
  document.getElementById('style').value = item.style || 'realistic';
  document.getElementById('size').value = item.size || '1024x1024';
  document.getElementById('negativePrompt').value = item.negative || '';
  document.getElementById('seedInput').value = item.seed || '';
  document.getElementById('savedList').classList.remove('open');
}
function deletePrompt(i) { const list = getSavedPrompts(); list.splice(i, 1); setSavedPrompts(list); }
function toggleSaved() { const el = document.getElementById('savedList'); el.classList.toggle('open'); if (el.classList.contains('open')) renderSaved(); }
function renderSaved() {
  const list = getSavedPrompts();
  document.getElementById('savedList').innerHTML = list.length ? list.map((item, i) =>
    `<div class="saved-item" onclick="loadPrompt(getSavedPrompts()[${i}])"><span class="name">${item.name}</span><span class="del" onclick="event.stopPropagation();deletePrompt(${i})">✕</span></div>`
  ).join('') : '<div style="color:#555;font-size:13px;padding:8px">尚無收藏</div>';
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { showError('請輸入內容'); return; }
  const mode = document.getElementById('mode').value;
  const style = document.getElementById('style').value;
  const code = document.getElementById('shareCode').value.trim();
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('error').style.display = 'none';
  document.getElementById('palette').classList.remove('show');
  try {
    document.getElementById('loading').innerHTML = '<div>⏳ 優化提示詞中...</div>';

// === Palette ===
function extractPalette(img) {
  const c = document.createElement('canvas'), ctx = c.getContext('2d');
  c.width = c.height = 64;
  try {
    ctx.drawImage(img, 0, 0, 64, 64);
    const d = ctx.getImageData(0, 0, 64, 64).data;
    const map = {};
    for (let i = 0; i < d.length; i += 16) {
      const k = `${Math.round(d[i]/32)*32},${Math.round(d[i+1]/32)*32},${Math.round(d[i+2]/32)*32}`;
      map[k] = (map[k] || 0) + 1;
    }
    const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 6);
    const el = document.getElementById('palette');
    el.innerHTML = sorted.map(([k]) => { const [r,g,b] = k.split(','); const h = '#'+[r,g,b].map(c=>parseInt(c).toString(16).padStart(2,'0')).join(''); return `<div class="swatch" style="background:${h}" onclick="navigator.clipboard.writeText('${h}')" title="複製 ${h}"><span class="hex">${h}</span></div>`; }).join('');
    el.classList.add('show');
  } catch(e) {}
}

async function generateStory() {
  const theme = document.getElementById('storyTheme').value.trim();
  if (!theme) { alert('請輸入故事主題'); return; }
  const style = document.getElementById('storyStyle').value;
  const resultDiv = document.getElementById('storyResult');
  const loading = document.getElementById('storyLoading');
  resultDiv.innerHTML = '';
  loading.style.display = 'block';
  try {
    const res = await fetch('/storyboard', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ theme, style }) });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || '失敗'); }
    const data = await res.json();
    loading.style.display = 'none';
    if (!data.scenes || !data.scenes.length) throw new Error('沒有產生故事');
    resultDiv.innerHTML = `<h2 style="font-size:18px;margin-bottom:12px;text-align:center">📖 ${data.title}</h2>`;
    for (const [i, scene] of data.scenes.entries()) {

      resultDiv.appendChild(div);

// ===== 3. Chat =====
const chatBox = document.getElementById('chatBox'), chatInput = document.getElementById('chatInput');
let chatHistory = [];
function addChatMsg(text, role) { const d = document.createElement('div'); d.className = 'chat-msg ' + role; d.textContent = text; chatBox.appendChild(d); chatBox.scrollTop = chatBox.scrollHeight; }
async function sendChatMessage() {
  const msg = chatInput.value.trim();
  if (!msg) return;
  chatInput.value = '';
  addChatMsg(msg, 'user');
  chatHistory.push({ role: 'user', content: msg });
  const ld = document.createElement('div'); ld.className = 'chat-msg loading'; ld.textContent = '⏳'; chatBox.appendChild(ld);
  try {
    const res = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg, history: chatHistory.slice(-10) }) });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || '連線失敗'); }
    const reader = res.body.getReader(), dec = new TextDecoder();
    let reply = ''; ld.remove();
    const rd = document.createElement('div'); rd.className = 'chat-msg bot'; chatBox.appendChild(rd);
    while (true) { const { done, value } = await reader.read(); if (done) break; reply += dec.decode(value, { stream: true }); rd.textContent = reply; chatBox.scrollTop = chatBox.scrollHeight; }
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (e) { ld.remove(); addChatMsg(e.message, 'error'); }
}

function renderCollageThumbs() {

}
function removeCollageImg(i) { collageImages.splice(i, 1); renderCollageThumbs(); }
async function renderCollage() {
  const layout = document.getElementById('collageLayout').value;
  const [cols, rows] = layout.split('x').map(Number);
  const needed = cols * rows;
  if (collageImages.length < needed) { alert(`需要 ${needed} 張圖片，目前只有 ${collageImages.length} 張`); return; }
  const cellW = 200, cellH = 200;
  const canvas = document.createElement('canvas');
  canvas.width = cols * cellW; canvas.height = rows * cellH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  const imgs = collageImages.slice(0, needed);
  for (let i = 0; i < imgs.length; i++) {
    const x = (i % cols) * cellW, y = Math.floor(i / cols) * cellH;
    const img = imgs[i];
    const scale = Math.max(cellW / img.width, cellH / img.height);
    const sw = img.width * scale, sh = img.height * scale;
    const sx = x + (cellW - sw) / 2, sy = y + (cellH - sh) / 2;
    ctx.drawImage(img, sx, sy, sw, sh);
  }
  const resultDiv = document.getElementById('collageResult');
  resultDiv.innerHTML = '';
  resultDiv.style.display = 'block';
  resultDiv.appendChild(canvas);
  canvas.style.cssText = 'width:100%;border-radius:12px';
  document.getElementById('collageDlBtn').style.display = 'inline-block';
}

// ===== 8. Video Slideshow =====
let vidImages = [];
let vidAnimId = null;

document.getElementById('vidUpload').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.classList.add('dragover'); });
document.getElementById('vidUpload').addEventListener('dragleave', e => e.currentTarget.classList.remove('dragover'));
document.getElementById('vidUpload').addEventListener('drop', e => {
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  handleVidFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});
function loadVidImages(e) { handleVidFiles(Array.from(e.target.files).filter(f => f.type.startsWith('image/'))); }
function handleVidFiles(files) {
  files.forEach(file => {
    const r = new FileReader();
    r.onload = function(ev) {
      const img = new Image();
      img.onload = () => { vidImages.push(img); renderVidThumbs(); };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  });
}
function renderVidThumbs() {
  const div = document.getElementById('vidThumbs');
  div.innerHTML = vidImages.map((img, i) => `<img src="${img.src}" onclick="removeVidImg(${i})" title="點擊移除">`).join('');
  document.getElementById('vidUploadText').textContent = vidImages.length ? `${vidImages.length} 張圖片（點擊移除）` : '選擇多張圖片，自動輪播成影片';
}

function removeVidImg(i) { vidImages.splice(i, 1); renderVidThumbs(); stopVid(); }

function playVid() {
  if (vidImages.length < 2) { alert('至少需要 2 張圖片'); return; }
  const canvas = document.getElementById('vidCanvas');
  const ctx = canvas.getContext('2d');
  const W = 600, H = 400;
  canvas.width = W; canvas.height = H;
  const duration = parseFloat(document.getElementById('vidDuration').value);
  const transition = document.getElementById('vidTransition').value;
  const totalTime = (duration + 0.5) * vidImages.length;
  const btn = document.getElementById('vidPlayBtn');
  btn.textContent = '⏹️ 停止';
  btn.onclick = stopVid;
  document.getElementById('vidStatus').textContent = '▶️ 播放中...';

  if (vidAnimId) cancelAnimationFrame(vidAnimId);
  const start = performance.now();

  function drawImage(img, x, y, w, h) {
    const s = Math.max(w / img.width, h / img.height);
    const sw = img.width * s, sh = img.height * s;
    ctx.drawImage(img, x + (w - sw) / 2, y + (h - sh) / 2, sw, sh);
  }

  function frame(now) {
    const t = ((now - start) / 1000) % totalTime;
    const segLen = duration + 0.5;
    const seg = Math.floor(t / segLen);
    const localT = (t - seg * segLen);
    const i0 = seg % vidImages.length;
    const i1 = (seg + 1) % vidImages.length;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    if (localT < duration) {
      drawImage(vidImages[i0], 0, 0, W, H);
    } else {
      const progress = (localT - duration) / 0.5;
      switch (transition) {
        case 'slide':
          drawImage(vidImages[i0], -W * progress, 0, W, H);
          drawImage(vidImages[i1], W * (1 - progress), 0, W, H);
          break;
        case 'zoom':
          const s0 = 1 + progress * 0.15;
          const s1 = 0.85 + progress * 0.15;
          ctx.save();
          ctx.translate(W/2, H/2);
          ctx.scale(s0, s0);
          ctx.globalAlpha = 1 - progress;
          ctx.drawImage(vidImages[i0], -W/2, -H/2, W, H);
          ctx.restore();
          ctx.save();
          ctx.translate(W/2, H/2);
          ctx.scale(s1, s1);
          ctx.globalAlpha = progress;
          ctx.drawImage(vidImages[i1], -W/2, -H/2, W, H);
          ctx.restore();
          break;
        default: // fade
          ctx.globalAlpha = 1 - progress;
          drawImage(vidImages[i0], 0, 0, W, H);
          ctx.globalAlpha = progress;
          drawImage(vidImages[i1], 0, 0, W, H);
          break;
      }
    }
    vidAnimId = requestAnimationFrame(frame);
  }
  vidAnimId = requestAnimationFrame(frame);
  document.getElementById('vidDlBtn').style.display = 'none';
}

function stopVid() {
  if (vidAnimId) { cancelAnimationFrame(vidAnimId); vidAnimId = null; }
  const btn = document.getElementById('vidPlayBtn');
  btn.textContent = '▶️ 播放';
  btn.onclick = playVid;
  document.getElementById('vidStatus').textContent = '⏹️ 已停止';
}

async function downloadVid() {
  const canvas = document.getElementById('vidCanvas');
  if (!canvas || vidImages.length < 2) return;
  document.getElementById('vidStatus').textContent = '⏳ 錄製中...';
  const stream = canvas.captureStream(30);
  const mr = new MediaRecorder(stream, { mimeType: 'video/webm' });
  const chunks = [];
  mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mr.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const a = document.createElement('a');
    a.download = 'slideshow.webm';
    a.href = URL.createObjectURL(blob);
    a.click();
    document.getElementById('vidStatus').textContent = '✅ 已下載';
  };
  mr.start();
  // Stop recording after one full loop + buffer
  const duration = parseFloat(document.getElementById('vidDuration').value);
  setTimeout(() => { mr.stop(); }, (duration + 0.5) * vidImages.length * 1000 + 500);
}

function populateVoices() {

function speakTTS() {
  const text = document.getElementById('ttsText').value.trim();
  if (!text) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-TW';
  utter.rate = parseFloat(document.getElementById('ttsRate').value);
  const selected = document.getElementById('ttsVoice').value;
  if (selected) { const v = speechSynthesis.getVoices().find(v => v.name === selected); if (v) utter.voice = v; }
  utter.onstart = () => document.getElementById('ttsStatus').textContent = '🔊 朗讀中...';
  utter.onend = () => document.getElementById('ttsStatus').textContent = '✅ 朗讀完成';
  utter.onerror = (e) => document.getElementById('ttsStatus').textContent = '❌ 錯誤: ' + e.error;
  window.speechSynthesis.speak(utter);
}
function stopTTS() { window.speechSynthesis.cancel(); document.getElementById('ttsStatus').textContent = '⏹️ 已停止'; }
